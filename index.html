<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Google Sheet Viewer</title>
</head>
<body>

<h2>ข้อมูลจาก Google Sheet</h2>

<table border="1" id="table"></table>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/XXXXXXXXXXXXXXXX/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(csv => {

    const rows = csv.trim().split("\n");

    let html = "";

    rows.forEach((row,i)=>{

        const cols = row.split(",");

        html += "<tr>";

        cols.forEach(col=>{
            html += i==0
                ? `<th>${col}</th>`
                : `<td>${col}</td>`;
        });

        html += "</tr>";

    });

    document.getElementById("table").innerHTML = html;

});
</script>

</body>
</html>
